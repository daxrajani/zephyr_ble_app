# Bluetooth host
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Dax_BLE_Ext"

# Bluetooth controller (software link layer)
CONFIG_BT_LL_SW_SPLIT=y

# Logging
CONFIG_LOG=y

CONFIG_BT_EXT_ADV=y
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_SETTINGS_NVS=y